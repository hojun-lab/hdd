<svg xmlns="http://www.w3.org/2000/svg" width="860" height="390" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arr-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f38ba8"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#a6e3a1"/>
    </marker>
    <marker id="arr-gray" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#585b70"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="390" fill="#13131f" rx="16"/>

  <!-- Divider -->
  <line x1="430" y1="18" x2="430" y2="372" stroke="#313244" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- ====== LEFT: synchronized ====== -->
  <text x="215" y="36" text-anchor="middle" fill="#f38ba8" font-size="16" font-weight="bold">synchronized</text>
  <text x="215" y="54" text-anchor="middle" fill="#585b70" font-size="11">모든 스레드가 하나의 락에서 직렬화</text>

  <!-- Threads stacked -->
  <!-- T1: active -->
  <rect x="22" y="78" width="64" height="28" rx="6" fill="#f38ba8"/>
  <text x="54" y="97" text-anchor="middle" fill="#13131f" font-size="13" font-weight="bold">T1</text>

  <!-- T2-T5: waiting -->
  <rect x="22" y="117" width="64" height="28" rx="6" fill="#2e2e42"/>
  <text x="54" y="136" text-anchor="middle" fill="#585b70" font-size="13">T2</text>

  <rect x="22" y="156" width="64" height="28" rx="6" fill="#2e2e42"/>
  <text x="54" y="175" text-anchor="middle" fill="#585b70" font-size="13">T3</text>

  <rect x="22" y="195" width="64" height="28" rx="6" fill="#2e2e42"/>
  <text x="54" y="214" text-anchor="middle" fill="#585b70" font-size="13">T4</text>

  <rect x="22" y="234" width="64" height="28" rx="6" fill="#2e2e42"/>
  <text x="54" y="253" text-anchor="middle" fill="#585b70" font-size="13">T5</text>

  <!-- T1 arrow (active) -->
  <line x1="86" y1="92" x2="148" y2="92" stroke="#f38ba8" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- T2-T5 blocked arrows (dashed, stop at lock) -->
  <line x1="86" y1="131" x2="140" y2="131" stroke="#2e2e42" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="143" y="136" fill="#585b70" font-size="14">✕</text>

  <line x1="86" y1="170" x2="140" y2="170" stroke="#2e2e42" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="143" y="175" fill="#585b70" font-size="14">✕</text>

  <line x1="86" y1="209" x2="140" y2="209" stroke="#2e2e42" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="143" y="214" fill="#585b70" font-size="14">✕</text>

  <line x1="86" y1="248" x2="140" y2="248" stroke="#2e2e42" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="143" y="253" fill="#585b70" font-size="14">✕</text>

  <!-- LOCK box -->
  <rect x="158" y="68" width="74" height="210" rx="8" fill="#1e1e2e" stroke="#f38ba8" stroke-width="1.5"/>
  <!-- Lock body -->
  <rect x="175" y="158" width="40" height="32" rx="4" fill="#f38ba8" opacity="0.85"/>
  <!-- Lock shackle (arc) -->
  <path d="M181,158 L181,148 A14,14 0 0,1 209,148 L209,158" fill="none" stroke="#f38ba8" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Keyhole -->
  <circle cx="195" cy="170" r="5" fill="#13131f"/>
  <rect x="193" y="171" width="4" height="8" rx="1" fill="#13131f"/>
  <text x="195" y="210" text-anchor="middle" fill="#f38ba8" font-size="9" font-weight="bold">LOCK</text>

  <!-- Arrow from lock to pool -->
  <line x1="232" y1="170" x2="280" y2="170" stroke="#f38ba8" stroke-width="2" marker-end="url(#arr-red)"/>

  <!-- Pool box -->
  <rect x="280" y="148" width="108" height="44" rx="7" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1.5"/>
  <text x="334" y="167" text-anchor="middle" fill="#cba6f7" font-size="11" font-weight="bold">Pool</text>
  <text x="334" y="183" text-anchor="middle" fill="#585b70" font-size="10">Connection × 10</text>

  <!-- Bottom note -->
  <text x="215" y="315" text-anchor="middle" fill="#585b70" font-size="10">T1만 진행 중 — T2 ~ T5는 락 해제까지 블로킹</text>

  <!-- ====== RIGHT: CAS ====== -->
  <text x="645" y="36" text-anchor="middle" fill="#a6e3a1" font-size="16" font-weight="bold">CAS (AtomicInteger)</text>
  <text x="645" y="54" text-anchor="middle" fill="#585b70" font-size="11">각 스레드가 독립적으로 상태 변경 시도</text>

  <!-- Threads horizontal -->
  <!-- T1 -->
  <rect x="442" y="78" width="52" height="28" rx="6" fill="#a6e3a1"/>
  <text x="468" y="97" text-anchor="middle" fill="#13131f" font-size="13" font-weight="bold">T1</text>

  <!-- T2 -->
  <rect x="504" y="78" width="52" height="28" rx="6" fill="#a6e3a1"/>
  <text x="530" y="97" text-anchor="middle" fill="#13131f" font-size="13" font-weight="bold">T2</text>

  <!-- T3 (will fail, already IN_USE) -->
  <rect x="566" y="78" width="52" height="28" rx="6" fill="#2e2e42"/>
  <text x="592" y="97" text-anchor="middle" fill="#585b70" font-size="13">T3</text>

  <!-- T4 -->
  <rect x="628" y="78" width="52" height="28" rx="6" fill="#a6e3a1"/>
  <text x="654" y="97" text-anchor="middle" fill="#13131f" font-size="13" font-weight="bold">T4</text>

  <!-- T5 (will fail) -->
  <rect x="690" y="78" width="52" height="28" rx="6" fill="#2e2e42"/>
  <text x="716" y="97" text-anchor="middle" fill="#585b70" font-size="13">T5</text>

  <!-- Arrows down to connections -->
  <line x1="468" y1="106" x2="468" y2="164" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="530" y1="106" x2="530" y2="164" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="592" y1="106" x2="592" y2="164" stroke="#585b70" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <line x1="654" y1="106" x2="654" y2="164" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="716" y1="106" x2="716" y2="164" stroke="#585b70" stroke-width="1.5" marker-end="url(#arr-gray)"/>

  <!-- Connection slots -->
  <!-- conn1: 0→1 success -->
  <rect x="442" y="164" width="52" height="56" rx="6" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="2"/>
  <text x="468" y="182" text-anchor="middle" fill="#585b70" font-size="9">conn 1</text>
  <text x="468" y="200" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">0 → 1</text>
  <text x="468" y="214" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ 획득</text>

  <!-- conn2: 0→1 success -->
  <rect x="504" y="164" width="52" height="56" rx="6" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="2"/>
  <text x="530" y="182" text-anchor="middle" fill="#585b70" font-size="9">conn 2</text>
  <text x="530" y="200" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">0 → 1</text>
  <text x="530" y="214" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ 획득</text>

  <!-- conn3: already 1, fail -->
  <rect x="566" y="164" width="52" height="56" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="592" y="182" text-anchor="middle" fill="#585b70" font-size="9">conn 3</text>
  <text x="592" y="200" text-anchor="middle" fill="#f38ba8" font-size="13" font-weight="bold">1</text>
  <text x="592" y="214" text-anchor="middle" fill="#f38ba8" font-size="10">↺ 재시도</text>

  <!-- conn4: 0→1 success -->
  <rect x="628" y="164" width="52" height="56" rx="6" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="2"/>
  <text x="654" y="182" text-anchor="middle" fill="#585b70" font-size="9">conn 4</text>
  <text x="654" y="200" text-anchor="middle" fill="#a6e3a1" font-size="13" font-weight="bold">0 → 1</text>
  <text x="654" y="214" text-anchor="middle" fill="#a6e3a1" font-size="10">✓ 획득</text>

  <!-- conn5: already 1, fail -->
  <rect x="690" y="164" width="52" height="56" rx="6" fill="#1e1e2e" stroke="#45475a" stroke-width="1.5"/>
  <text x="716" y="182" text-anchor="middle" fill="#585b70" font-size="9">conn 5</text>
  <text x="716" y="200" text-anchor="middle" fill="#f38ba8" font-size="13" font-weight="bold">1</text>
  <text x="716" y="214" text-anchor="middle" fill="#f38ba8" font-size="10">↺ 재시도</text>

  <!-- compareAndSet label -->
  <text x="645" y="258" text-anchor="middle" fill="#cba6f7" font-size="12" font-weight="bold">compareAndSet(0, 1)</text>
  <text x="645" y="274" text-anchor="middle" fill="#585b70" font-size="10">락 없이, 원자적으로 상태만 변경</text>

  <!-- Bottom note -->
  <text x="645" y="315" text-anchor="middle" fill="#585b70" font-size="10">중앙 병목 없음 — 동시에 각자 다른 커넥션 시도 가능</text>
</svg>